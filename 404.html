<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Cafe Pizza House</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/logo-circle.jpg">
  <link rel="icon" type="image/jpeg" href="/images/logo-circle.jpg">
</head>
<body style="background-color: var(--background);">
  <script>
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }
  </script>

  <!-- ===== 404 CONTENT ===== -->
  <main class="lost-pizza-page">
    <div class="lost-pizza-content">
      <span class="lost-pizza-emoji" aria-hidden="true">🍕</span>
      <h1>Oops! Looks like this pizza got lost 🍕</h1>
      <p>The page you are looking for has either been eaten, or never existed in the first place. Let's get you back to safety!</p>
      <a href="index" class="btn btn-primary">Back to Home</a>
    </div>
  </main>

</body>
</html>
